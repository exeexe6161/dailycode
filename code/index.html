<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" id="themeColor" content="#f4f5f7">
  <script src="theme-init.js"></script>
  <title>dailycode</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

  <!-- Driftender Lichthintergrund, rein dekorativ, hinter dem Inhalt -->
  <canvas id="bgCanvas" class="bg-canvas" aria-hidden="true"></canvas>

  <!-- Symbol Definitionen, selbst gezeichnet, einmalig -->
  <svg width="0" height="0" aria-hidden="true" focusable="false" class="svg-defs">
    <defs>
      <symbol id="sym-circle" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="34"/>
      </symbol>
      <symbol id="sym-triangle" viewBox="0 0 100 100">
        <polygon points="50,16 84,82 16,82"/>
      </symbol>
      <symbol id="sym-square" viewBox="0 0 100 100">
        <rect x="20" y="20" width="60" height="60" rx="8"/>
      </symbol>
      <symbol id="sym-diamond" viewBox="0 0 100 100">
        <polygon points="50,12 88,50 50,88 12,50"/>
      </symbol>
      <symbol id="sym-star" viewBox="0 0 100 100">
        <polygon points="50,10 59.4,37.1 88,37.6 65.2,54.9 73.5,82.4 50,66 26.5,82.4 34.8,54.9 12,37.6 40.6,37.1"/>
      </symbol>
      <symbol id="sym-hexagon" viewBox="0 0 100 100">
        <polygon points="50,10 84.6,30 84.6,70 50,90 15.4,70 15.4,30"/>
      </symbol>
    </defs>
  </svg>

  <main class="app">
    <header class="head">
      <a class="back-link" id="backLink" href="../index.html">
        <svg class="lucide" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        <span id="backLabel"></span>
      </a>
      <h1 class="title">dailycode</h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </header>

    <nav class="langbar" id="langbar"></nav>
    <nav class="themebar" id="themebar"></nav>
    <p class="toggle-feedback" id="themeFeedback" role="status" aria-live="polite"></p>

    <section class="board" id="board" data-i18n-aria="aria_board"></section>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <section class="palette" id="palette" data-i18n-aria="aria_palette"></section>

    <div class="controls">
      <button type="button" class="btn btn-ghost" id="clear" data-i18n="btn_clear"></button>
      <button type="button" class="btn btn-primary" id="check" disabled data-i18n="btn_check"></button>
    </div>

    <section class="result" id="result" hidden data-i18n-aria="aria_result">
      <p class="result-line" id="resultLine"></p>
      <pre class="share-grid" id="shareGrid" aria-hidden="true"></pre>
      <div class="share-actions">
        <button type="button" class="btn btn-primary" id="copyBtn" data-i18n="btn_copy"></button>
      </div>
      <p class="copy-feedback" id="copyFeedback" role="status" aria-live="polite"></p>
      <div class="stats" id="stats"></div>
    </section>

    <details class="help">
      <summary data-i18n="help_summary"></summary>
      <ul>
        <li data-i18n="help_1"></li>
        <li data-i18n="help_2"></li>
        <li data-i18n="help_green"></li>
        <li data-i18n="help_yellow"></li>
        <li data-i18n="help_gray"></li>
        <li data-i18n="help_keyboard"></li>
      </ul>
    </details>

    <footer class="footer">
      <a class="footer-link" id="linkPrivacy" href="../datenschutz-en.html">
        <svg class="footer-ico lucide" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        <span data-i18n="nav_privacy"></span>
      </a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a class="footer-link" id="linkImprint" href="../impressum-en.html">
        <svg class="footer-ico lucide" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        <span data-i18n="nav_imprint"></span>
      </a>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
