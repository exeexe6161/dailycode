<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="dailycode">
  <!-- Selbst gezeichnet, dunkle Aesthetik mit sanftem Leuchten. Keine Fremdgrafik. -->
  <rect width="512" height="512" rx="112" fill="#0a0c11"/>
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="#2a2f3b" stroke-width="6"/>
  <!-- Kette aus drei Segmenten, indigo, dezent -->
  <rect x="120" y="232" width="72" height="72" rx="20" fill="#3a4cae"/>
  <rect x="208" y="232" width="72" height="72" rx="20" fill="#5670e0"/>
  <rect x="296" y="232" width="72" height="72" rx="20" fill="#6b8cff"/>
  <!-- Sammelobjekt, leuchtender Punkt in Signalgruen -->
  <circle cx="392" cy="160" r="30" fill="#34d399"/>
</svg>
