  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#16181B" media="(prefers-color-scheme: dark)">

<body>

  <main class="app">
    <header class="head">
      <div class="head-brand">
        <div class="head-logo" role="img" aria-label="PuzzlePure">
          <img src="brand/puzzlepure-lockup-karbon.svg" alt="" class="logo-light" aria-hidden="true" height="32">
          <img src="brand/puzzlepure-lockup-white.svg" alt="" class="logo-dark" aria-hidden="true" height="32">
        </div>
      </div>
      <div class="head-controls">
        <nav class="langbar" id="langbar"></nav>
        <nav class="themebar" id="themebar"></nav>
      </div>
    </header>
    <p class="toggle-feedback" id="themeFeedback" role="status" aria-live="polite"></p>

    <section class="tiles" id="tiles" data-i18n-aria="aria_tiles">
      <a class="tile tile-img" id="tileGame" href="code/index.html" data-i18n-aria="tile_game_aria">
        <img class="tile-cover" src="assets/games/ciphera.png" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileDrift" href="drift/index.html" data-i18n-aria="tile_drift_aria">
        <img class="tile-cover" src="assets/games/serpix.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-img" id="tileCluster" href="cluster/index.html" data-i18n-aria="tile_cluster_aria">
        <img class="tile-cover" src="assets/games/nexa.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-img" id="tileEcho" href="echo/index.html" data-i18n-aria="tile_echo_aria">

      </a>
      <a class="tile tile-img" id="tileGlyph" href="glyph/index.html" data-i18n-aria="tile_glyph_aria">
        <img class="tile-cover" src="assets/games/lexiq.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-img" id="tileGrid9" href="grid9/index.html" data-i18n-aria="tile_grid9_aria">

        <img class="tile-cover" src="assets/games/reflexa.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-img" id="tileFlow8" href="flow8/index.html" data-i18n-aria="tile_flow8_aria">
        <img class="tile-cover" src="assets/games/fluxa.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-img" id="tilePicto" href="picto/index.html" data-i18n-aria="tile_picto_aria">
        <img class="tile-cover" src="assets/games/pixela.png" alt="" width="600" height="600" decoding="async" loading="lazy">
      </a>
      <a class="tile tile-placeholder" id="tileQuestra" href="questra/index.html" data-i18n-aria="tile_questra_aria">
        <div class="tile-ph-art" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="none" stroke="#3b5bdb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="18" y="18" width="64" height="64" rx="16"/>
            <path d="M38 40c0-8 6-14 14-14s14 5 14 13c0 9-8 11-11 17-1 2-2 4-2 6"/>
            <circle cx="53" cy="74" r="3" fill="#3b5bdb" stroke="none"/>
          </svg>
        </div>
        <div class="tile-ph-name" data-i18n="tile_questra_name"></div>
      </a>

    <footer class="footer">

      </a>
    </footer>

  <script src="portal.js"></script>

</html>
