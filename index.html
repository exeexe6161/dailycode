<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" id="themeColor" content="#f4f5f7">
  <script src="theme-init.js"></script>
  <title>dailycode</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="portal-icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="portal-icon-192.png">
</head>
<body>

  <main class="app">
    <header class="head">
      <h1 class="title">dailycode</h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </header>

    <nav class="langbar" id="langbar"></nav>
    <nav class="themebar" id="themebar"></nav>

    <section class="tiles" id="tiles" data-i18n-aria="aria_tiles">
      <a class="tile" id="tileGame" href="code/index.html" data-i18n-aria="tile_game_aria">
        <span class="tile-name" data-i18n="tile_game_name"></span>
        <span class="tile-desc" data-i18n="tile_game_desc"></span>
      </a>
      <div class="tile tile-soon" aria-disabled="true" data-i18n-aria="tile_soon_aria">
        <span class="tile-name" data-i18n="tile_soon_name"></span>
        <span class="tile-desc" data-i18n="tile_soon_desc"></span>
        <span class="tile-badge" data-i18n="badge_soon"></span>
      </div>
      <div class="tile tile-soon" aria-disabled="true" data-i18n-aria="tile_soon_aria">
        <span class="tile-name" data-i18n="tile_soon_name"></span>
        <span class="tile-desc" data-i18n="tile_soon_desc"></span>
        <span class="tile-badge" data-i18n="badge_soon"></span>
      </div>
      <div class="tile tile-soon" aria-disabled="true" data-i18n-aria="tile_soon_aria">
        <span class="tile-name" data-i18n="tile_soon_name"></span>
        <span class="tile-desc" data-i18n="tile_soon_desc"></span>
        <span class="tile-badge" data-i18n="badge_soon"></span>
      </div>
    </section>

    <footer class="footer">
      <a class="footer-link" id="linkPrivacy" href="datenschutz-en.html" data-i18n="nav_privacy"></a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a class="footer-link" id="linkImprint" href="impressum-en.html" data-i18n="nav_imprint"></a>
    </footer>
  </main>

  <script src="portal.js"></script>
</body>
</html>
