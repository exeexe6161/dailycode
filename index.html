<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script src="theme-init.js"></script>
  <title>PuzzlePure</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#16181B">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#16181B" media="(prefers-color-scheme: dark)">
  <meta property="og:title" content="PuzzlePure">
  <meta property="og:description" content="Kleine Denkspiele, klar und ruhig. Ohne Laerm, ohne Werbung, ohne Tracking.">
  <meta property="og:url" content="https://www.puzzlepure.com">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>

  <main class="app">
    <header class="head">
      <div class="head-brand">
        <div class="head-logo" role="img" aria-label="PuzzlePure">
          <img src="brand/puzzlepure-lockup-karbon.svg" alt="" class="logo-light" aria-hidden="true" height="32">
          <img src="brand/puzzlepure-lockup-white.svg" alt="" class="logo-dark" aria-hidden="true" height="32">
        </div>
      </div>
      <div class="head-controls">
        <nav class="langbar" id="langbar"></nav>
        <nav class="themebar" id="themebar"></nav>
      </div>
    </header>
    <p class="toggle-feedback" id="themeFeedback" role="status" aria-live="polite"></p>

    <section class="tiles" id="tiles" data-i18n-aria="aria_tiles">
      <a class="tile tile-img" id="tileGame" href="code/index.html" data-i18n-aria="tile_game_aria">
        <img class="tile-cover" src="assets/cover/code.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileDrift" href="drift/index.html" data-i18n-aria="tile_drift_aria">
        <img class="tile-cover" src="assets/cover/drift.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileCluster" href="cluster/index.html" data-i18n-aria="tile_cluster_aria">
        <img class="tile-cover" src="assets/cover/cluster.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileEcho" href="echo/index.html" data-i18n-aria="tile_echo_aria">
        <img class="tile-cover" src="assets/cover/echo.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileGlyph" href="glyph/index.html" data-i18n-aria="tile_glyph_aria">
        <img class="tile-cover" src="assets/cover/glyph.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileGrid9" href="grid9/index.html" data-i18n-aria="tile_grid9_aria">
        <img class="tile-cover" src="assets/cover/grid9.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileReact7" href="react7/index.html" data-i18n-aria="tile_react7_aria">
        <img class="tile-cover" src="assets/cover/react7.jpg" alt="" width="600" height="600" decoding="async">
      </a>
      <a class="tile tile-img" id="tileFlow8" href="flow8/index.html" data-i18n-aria="tile_flow8_aria">
        <img class="tile-cover" src="assets/cover/flow8.jpg" alt="" width="600" height="600" decoding="async">
      </a>
    </section>

    <footer class="footer">
      <a class="footer-link" id="linkPrivacy" href="datenschutz-en.html">
        <svg class="footer-ico lucide" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        <span data-i18n="nav_privacy"></span>
      </a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a class="footer-link" id="linkImprint" href="impressum-en.html">
        <svg class="footer-ico lucide" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        <span data-i18n="nav_imprint"></span>
      </a>
    </footer>
  </main>

  <script src="portal.js"></script>
</body>
</html>
