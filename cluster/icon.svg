<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="dailycode">
  <!-- Selbst gezeichnet, dunkle Aesthetik mit sanftem Leuchten. Drei
       verschiedene Formen als Gruppe, formbasiert (graustufentauglich). -->
  <rect width="512" height="512" rx="112" fill="#0a0c11"/>
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="#2a2f3b" stroke-width="6"/>
  <!-- Kreis -->
  <circle cx="180" cy="190" r="56" fill="#6b8cff"/>
  <!-- Quadrat -->
  <rect x="276" y="138" width="104" height="104" rx="18" fill="#fbbf24"/>
  <!-- Dreieck -->
  <polygon points="256,290 330,420 182,420" fill="#34d399"/>
</svg>
